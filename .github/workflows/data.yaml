name: Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: data
  cancel-in-progress: false

jobs:
  fetch-versions:
    name: Fetch PoE Versions
    runs-on: ubuntu-latest
    outputs:
      poe1_version: ${{ steps.versions.outputs.poe1 }}
      poe2_version: ${{ steps.versions.outputs.poe2 }}
    steps:
      - name: Fetch versions
        id: versions
        run: |
          VERSIONS=$(curl -sf https://poe-versions.obsoleet.org/)
          echo "poe1=$(echo "$VERSIONS" | jq -r '.poe')" >> "$GITHUB_OUTPUT"
          echo "poe2=$(echo "$VERSIONS" | jq -r '.poe2')" >> "$GITHUB_OUTPUT"

  extract-poe1:
    name: Extract PoE1 Data
    needs: fetch-versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Decide whether to run
        id: gate
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.fetch-versions.outputs.poe1_version }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          # Cadence tiers mirror app/data/lib/cadence.ts
          if [ "$FORCE" = "true" ]; then echo "run=true" >> "$GITHUB_OUTPUT"; exit 0; fi
          URL="https://github.com/$REPO/releases/download/data-poe1-$VERSION/manifest.json"
          M=$(curl -sfL "$URL" || true)
          if [ -z "$M" ]; then echo "run=true (new version)"; echo "run=true" >> "$GITHUB_OUTPUT"; exit 0; fi
          NOW=$(date -u +%s)
          CHG=$(date -u -d "$(echo "$M" | jq -r '.coreChangedAt')" +%s)
          CHK=$(date -u -d "$(echo "$M" | jq -r '.checkedAt')" +%s)
          SINCE_CHANGE=$(( (NOW - CHG) / 3600 ))
          SINCE_CHECK=$(( (NOW - CHK) / 3600 ))
          if [ "$SINCE_CHANGE" -lt 48 ]; then INTERVAL=0
          elif [ "$SINCE_CHANGE" -lt 168 ]; then INTERVAL=24
          else INTERVAL=72; fi
          if [ "$SINCE_CHECK" -ge "$INTERVAL" ]; then RUN=true; else RUN=false; fi
          echo "poe1 cadence: sinceChange=${SINCE_CHANGE}h sinceCheck=${SINCE_CHECK}h interval=${INTERVAL}h run=$RUN"
          echo "run=$RUN" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
        if: steps.gate.outputs.run == 'true'
      - uses: pnpm/action-setup@v6
        if: steps.gate.outputs.run == 'true'
      - uses: actions/setup-node@v6
        if: steps.gate.outputs.run == 'true'
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pnpm install --frozen-lockfile
      - name: Extract data
        id: extract
        if: steps.gate.outputs.run == 'true'
        run: pnpm data:poe1
        env:
          POELADDER_LEAGUE_SLUG_POE1: ${{ vars.POELADDER_LEAGUE_SLUG_POE1 }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      - name: Upsert release
        if: steps.gate.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.fetch-versions.outputs.poe1_version }}
          DATA_CHANGED: ${{ steps.extract.outputs.data_changed }}
        run: .github/scripts/upsert-release.sh poe1 "PoE1"
      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -sS -H "Content-Type: application/json" \
              -d "{\"content\":\"**DATA EXTRACTION FAILURE** — PoE1 ${{ needs.fetch-versions.outputs.poe1_version }}\\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "$DISCORD_WEBHOOK_URL"
          fi

  extract-poe2:
    name: Extract PoE2 Data
    needs: fetch-versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Decide whether to run
        id: gate
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.fetch-versions.outputs.poe2_version }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          # Cadence tiers mirror app/data/lib/cadence.ts
          if [ "$FORCE" = "true" ]; then echo "run=true" >> "$GITHUB_OUTPUT"; exit 0; fi
          URL="https://github.com/$REPO/releases/download/data-poe2-$VERSION/manifest.json"
          M=$(curl -sfL "$URL" || true)
          if [ -z "$M" ]; then echo "run=true (new version)"; echo "run=true" >> "$GITHUB_OUTPUT"; exit 0; fi
          NOW=$(date -u +%s)
          CHG=$(date -u -d "$(echo "$M" | jq -r '.coreChangedAt')" +%s)
          CHK=$(date -u -d "$(echo "$M" | jq -r '.checkedAt')" +%s)
          SINCE_CHANGE=$(( (NOW - CHG) / 3600 ))
          SINCE_CHECK=$(( (NOW - CHK) / 3600 ))
          if [ "$SINCE_CHANGE" -lt 48 ]; then INTERVAL=0
          elif [ "$SINCE_CHANGE" -lt 168 ]; then INTERVAL=24
          else INTERVAL=72; fi
          if [ "$SINCE_CHECK" -ge "$INTERVAL" ]; then RUN=true; else RUN=false; fi
          echo "poe2 cadence: sinceChange=${SINCE_CHANGE}h sinceCheck=${SINCE_CHECK}h interval=${INTERVAL}h run=$RUN"
          echo "run=$RUN" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
        if: steps.gate.outputs.run == 'true'
      - uses: pnpm/action-setup@v6
        if: steps.gate.outputs.run == 'true'
      - uses: actions/setup-node@v6
        if: steps.gate.outputs.run == 'true'
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pnpm install --frozen-lockfile
      - name: Extract data
        id: extract
        if: steps.gate.outputs.run == 'true'
        run: pnpm data:poe2
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      - name: Upsert release
        if: steps.gate.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.fetch-versions.outputs.poe2_version }}
          DATA_CHANGED: ${{ steps.extract.outputs.data_changed }}
        run: .github/scripts/upsert-release.sh poe2 "PoE2"
      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -sS -H "Content-Type: application/json" \
              -d "{\"content\":\"**DATA EXTRACTION FAILURE** — PoE2 ${{ needs.fetch-versions.outputs.poe2_version }}\\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "$DISCORD_WEBHOOK_URL"
          fi
