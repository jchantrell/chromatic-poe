name: Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: data
  cancel-in-progress: false

jobs:
  fetch-versions:
    name: Fetch PoE Versions
    runs-on: ubuntu-latest
    outputs:
      poe1_version: ${{ steps.versions.outputs.poe1 }}
      poe2_version: ${{ steps.versions.outputs.poe2 }}
    steps:
      - name: Fetch versions
        id: versions
        run: |
          VERSIONS=$(curl -sf https://poe-versions.obsoleet.org/)
          echo "poe1=$(echo "$VERSIONS" | jq -r '.poe')" >> "$GITHUB_OUTPUT"
          echo "poe2=$(echo "$VERSIONS" | jq -r '.poe2')" >> "$GITHUB_OUTPUT"

  extract-poe1:
    name: Extract PoE1 Data
    needs: fetch-versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Extract data
        run: pnpm data:poe1
        env:
          POELADDER_LEAGUE_SLUG_POE1: ${{ vars.POELADDER_LEAGUE_SLUG_POE1 }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      - name: Upsert release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="data-poe1-${{ needs.fetch-versions.outputs.poe1_version }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            gh release upload "$TAG" app/data/output/*.json --clobber --repo "${{ github.repository }}"
          else
            gh release create "$TAG" app/data/output/*.json --latest=false \
              --title "PoE1 Data ${{ needs.fetch-versions.outputs.poe1_version }}" \
              --notes "Auto-generated game data for PoE1 patch ${{ needs.fetch-versions.outputs.poe1_version }}" \
              --repo "${{ github.repository }}"
          fi
      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -sS -H "Content-Type: application/json" \
              -d "{\"content\":\"**DATA EXTRACTION FAILURE** — PoE1 ${{ needs.fetch-versions.outputs.poe1_version }}\\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "$DISCORD_WEBHOOK_URL"
          fi

  extract-poe2:
    name: Extract PoE2 Data
    needs: fetch-versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Extract data
        run: pnpm data:poe2
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      - name: Upsert release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="data-poe2-${{ needs.fetch-versions.outputs.poe2_version }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            gh release upload "$TAG" app/data/output/*.json --clobber --repo "${{ github.repository }}"
          else
            gh release create "$TAG" app/data/output/*.json --latest=false \
              --title "PoE2 Data ${{ needs.fetch-versions.outputs.poe2_version }}" \
              --notes "Auto-generated game data for PoE2 patch ${{ needs.fetch-versions.outputs.poe2_version }}" \
              --repo "${{ github.repository }}"
          fi
      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -sS -H "Content-Type: application/json" \
              -d "{\"content\":\"**DATA EXTRACTION FAILURE** — PoE2 ${{ needs.fetch-versions.outputs.poe2_version }}\\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "$DISCORD_WEBHOOK_URL"
          fi
